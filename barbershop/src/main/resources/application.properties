# ??? SERVIDOR ???????????????????????????????????????????
server.port=8080

# ??? BASE DE DATOS ??????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/barbershop_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ??? JPA / HIBERNATE ????????????????????????????????????
# update: crea/modifica tablas automáticamente sin borrar datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ??? JWT ????????????????????????????????????????????????
# secret de mínimo 32 caracteres para HS256
app.jwt.secret=barbershop_super_secret_key_2026_segura
# expiración: 24 horas en milisegundos
app.jwt.expiration-ms=86400000

# ??? FRONTEND URL (para CORS) ???????????????????????????
app.frontend.url=http://localhost:3000

# ??? STRIPE ?????????????????????????????????????????????
# reemplaza con tu clave de prueba desde dashboard.stripe.com
stripe.secret.key=sk_test_reemplazame

# ??? SWAGGER ????????????????????????????????????????????
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ??? LOGS ???????????????????????????????????????????????
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.barbershop=DEBUG